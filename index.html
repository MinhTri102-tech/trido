<!DOCTYPE html>
<html>
<head>
    <title>Trần Minh Trí</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #7a1b1b, #2a4320, #8a0d28);
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 80px;
        }

        img {
            width: 150px;
            border-radius: 50%;
            border: 4px solid white;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: white;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: black;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="https://via.placeholder.com/150" alt="avatar">

    <h1>Trần Minh Trí</h1>

    <div class="box">
        <h2>Giới thiệu</h2>
        <p>Xin chào! Mình là trí hiện tại mình 18 tuổi và đang học tại Cao đẳng Công nghệ Kỹ thuật Nha Trang.</p>
    </div>

    <div class="box">
        <h2>Mục tiêu</h2>
        <p>Phát triển kỹ năng lập trình web và trở thành lập trình viên chuyên nghiệp.</p>
    </div>

    <button onclick="contact()">Liên hệ mình</button>

</div>

<script>
    function contact() {
        alert("Cảm ơn bạn đã ghé thăm website của Trần Minh Trí!");
    }
</script>

</body>
</html>
